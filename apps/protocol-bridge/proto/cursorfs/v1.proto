syntax = "proto3";
package cursorfs.v1;

message CursorFSGetDiffRequest {
  string mount_id = 1;
}

message CursorFSGetDiffResponse {
  string diff = 1;
}

message CursorFSListMountsRequest {
}

message CursorFSListMountsResponse {
  repeated CursorFSMountInfo mounts = 1;
}

message CursorFSMountInfo {
  string mount_id = 1;
  string source_path = 2;
  int64 created_at = 3;
}

message CursorFSMountRequest {
  string directory_path = 1;
}

message CursorFSMountResponse {
  string mount_id = 1;
}

message CursorFSShutdownRequest {
}

message CursorFSShutdownResponse {
  bool success = 1;
}

message CursorFSUnmountRequest {
  string mount_id = 1;
}

message CursorFSUnmountResponse {
  bool success = 1;
  string error = 2;
}
